events {
    worker_connections 1024;
}


http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Upstream para o backend
    upstream backend {
        server 	omnixchannel-backend:3000; # 172.17.0.6:3000;
    }

    server {
        listen 80;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        # Servir arquivos estáticos
        location / {
            try_files $uri $uri/ =404;
        }

        # Proxy para o backend
        location /api/ {
            proxy_pass http://omnixchannel-backend:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Caching para assets
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg)$ {
            expires 1y;
            add_header Cache-Control "no-cache";
            #add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://omnix.conectxip.cloud; connect-src 'self' https://omnix.conectxip.cloud; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self';";
        }
    }
}
